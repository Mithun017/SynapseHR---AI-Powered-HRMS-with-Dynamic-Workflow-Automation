version: "3.8"

services:
  backend:
    build: ./backend
    container_name: synapse_backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./backend:/app
    depends_on:
      - postgres
      - redis

  frontend:
    build: ./frontend
    container_name: synapse_frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    env_file:
      - .env
    depends_on:
      - backend

  postgres:
    image: postgres:15-alpine
    container_name: synapse_postgres
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=Mithun1701
      - POSTGRES_DB=hrms_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: synapse_redis
    ports:
      - "6379:6379"

volumes:
  postgres_data:
